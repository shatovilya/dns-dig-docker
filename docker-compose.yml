services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dns_debug
      POSTGRES_USER: dns_debug
      POSTGRES_PASSWORD: dns_debug
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dns_debug -d dns_debug"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped

  dns-debugger:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "${DNS_DEBUG_HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DNS_DEBUG_DB_ENABLED: "true"
      DNS_DEBUG_DB_HOST: postgres
    volumes:
      - ./data/snapshots:/app/data/snapshots
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_RAW
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    # Autonomous mode: set AUTONOMOUS_MODE=true and AUTONOMOUS_RECORDS in .env
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles:
      - monitoring
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped

volumes:
  postgres_data:
